<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="420" viewBox="0 0 1080 420" role="img" aria-labelledby="title desc">
  <title id="title">Arquitetura AstroBand</title>
  <desc id="desc">Fluxo de sensores para ESP32, API REST, MQTT, dashboard e usuario.</desc>
  <rect width="1080" height="420" fill="#f4f7fb"/>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="40" y="42" font-size="24" font-weight="800" fill="#18202f">Arquitetura AstroBand</text>
    <text x="40" y="66" font-size="13" font-weight="700" fill="#687386">REST implementado no ESP32 + MQTT para demonstracao ao vivo no Wokwi</text>

    <g transform="translate(40 120)">
      <rect width="160" height="120" rx="8" fill="#ffffff" stroke="#dce3ed"/>
      <text x="80" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#18202f">Sensores</text>
      <text x="80" y="58" text-anchor="middle" font-size="12" fill="#687386">Potenciometro</text>
      <text x="80" y="78" text-anchor="middle" font-size="12" fill="#687386">HC-SR04</text>
      <text x="80" y="98" text-anchor="middle" font-size="12" fill="#687386">Botao SOS</text>
    </g>

    <g transform="translate(250 120)">
      <rect width="170" height="120" rx="8" fill="#111827"/>
      <text x="85" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">ESP32</text>
      <text x="85" y="62" text-anchor="middle" font-size="12" fill="#d1fae5">Processamento</text>
      <text x="85" y="82" text-anchor="middle" font-size="12" fill="#d1fae5">OLED + LEDs</text>
      <text x="85" y="102" text-anchor="middle" font-size="12" fill="#d1fae5">Wi-Fi</text>
    </g>

    <g transform="translate(480 92)">
      <rect width="180" height="96" rx="8" fill="#ffffff" stroke="#dce3ed"/>
      <text x="90" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#18202f">WebServer REST</text>
      <text x="90" y="56" text-anchor="middle" font-size="12" fill="#687386">/astronaut</text>
      <text x="90" y="74" text-anchor="middle" font-size="12" fill="#687386">JSON obrigatorio</text>
    </g>

    <g transform="translate(480 222)">
      <rect width="180" height="96" rx="8" fill="#ffffff" stroke="#dce3ed"/>
      <text x="90" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#18202f">MQTT</text>
      <text x="90" y="56" text-anchor="middle" font-size="12" fill="#687386">HiveMQ publico</text>
      <text x="90" y="74" text-anchor="middle" font-size="12" fill="#687386">telemetria ao vivo</text>
    </g>

    <g transform="translate(720 120)">
      <rect width="170" height="120" rx="8" fill="#ffffff" stroke="#dce3ed"/>
      <text x="85" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#18202f">Dashboard</text>
      <text x="85" y="62" text-anchor="middle" font-size="12" fill="#687386">HTML + CSS</text>
      <text x="85" y="82" text-anchor="middle" font-size="12" fill="#687386">JavaScript</text>
      <text x="85" y="102" text-anchor="middle" font-size="12" fill="#687386">Cards + grafico</text>
    </g>

    <g transform="translate(930 140)">
      <rect width="110" height="80" rx="8" fill="#0f766e"/>
      <text x="55" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">Usuario</text>
      <text x="55" y="56" text-anchor="middle" font-size="12" fill="#d1fae5">Missao</text>
    </g>

    <g stroke="#2563eb" stroke-width="3" fill="none" marker-end="url(#arrow)">
      <path d="M 200 180 L 250 180"/>
      <path d="M 420 162 L 480 140"/>
      <path d="M 420 198 L 480 270"/>
      <path d="M 660 140 C 690 140 690 160 720 160"/>
      <path d="M 660 270 C 690 270 690 200 720 200"/>
      <path d="M 890 180 L 930 180"/>
    </g>

    <text x="490" y="348" font-size="12" fill="#687386">REST atende aos endpoints exigidos. MQTT evita a limitacao do IP interno do Wokwi na apresentacao.</text>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
  </defs>
</svg>
