<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">Previa do dashboard AstroBand</title>
  <desc id="desc">Representacao visual do dashboard com conexao MQTT, cards e grafico.</desc>
  <rect width="980" height="560" fill="#f4f7fb"/>
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="20" y="24" width="58" height="58" rx="8" fill="#0f766e"/>
