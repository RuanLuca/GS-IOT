      <text x="20" y="76" font-size="36" font-weight="800" fill="#18202f">36.8 C</text>
      <rect x="20" y="86" width="74" height="24" rx="12" fill="#dcfce7"/>
      <text x="57" y="103" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">Normal</text>
