    <text x="96" y="42" font-size="13" font-weight="700" fill="#687386">FIAP | DISRUPTIVE ARCHITECTURES</text>
    <text x="96" y="82" font-size="52" font-weight="800" fill="#18202f">AstroBand</text>

    <rect x="760" y="42" width="172" height="42" rx="8" fill="#ffffff" stroke="#dce3ed"/>
